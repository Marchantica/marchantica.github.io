<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor e Impresora de PDFs</title>
    <style>
        :root {
            --primary: #4F46E5;
            --danger: #EF4444;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #333;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .upload-section { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
        input[type="file"] { flex-grow: 1; }
        ul { list-style-type: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background-color: var(--bg); margin-bottom: 0.5rem; border-radius: 6px; }
        .doc-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
        .actions button { border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; margin-left: 0.5rem; }
        .btn-print { background-color: var(--primary); }
        .btn-print:hover { background-color: #4338CA; }
        .btn-delete { background-color: var(--danger); }
        .btn-delete:hover { background-color: #DC2626; }
        .status { font-size: 0.875rem; color: #6B7280; text-align: right; margin-bottom: 1rem; }
        
        /* Oculto por defecto */
        #print-iframe { display: none; }

        /* --- ESTILOS DEL MODAL DE VISTA PREVIA --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 1.5rem;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .preview-container {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .print-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .copies-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .copies-control input {
            width: 60px;
            padding: 0.4rem;
            text-align: center;
        }
        .btn-cancel {
            background-color: #9CA3AF; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gestor de Documentos PDF</h1>
        <div class="status" id="statusCount">Documentos: 0 / 5</div>
        <div class="upload-section">
            <input type="file" id="fileInput" accept="application/pdf">
        </div>
        <ul id="docList"></ul>
    </div>

    <!-- Iframe invisible para gestionar la impresión real -->
    <iframe id="print-iframe"></iframe>

    <!-- MODAL DE VISTA PREVIA -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <h2 style="margin: 0; font-size: 1.2rem;">Vista Previa e Impresión</h2>
            
            <div class="preview-container">
                <iframe id="preview-frame"></iframe>
            </div>

            <div class="print-controls">
                <div class="copies-control">
                    <label for="copiesInput">Copias:</label>
                    <input type="number" id="copiesInput" value="1" min="1" max="10">
                </div>
                <div>
                    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button class="btn-print" style="border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; color: white; font-weight: bold;" onclick="executePrint()">🖨️ Enviar a Imprimir</button>
                </div>
            </div>
            <!-- Mensaje de estado al imprimir -->
            <div id="printStatus" style="color: var(--primary); font-size: 0.9rem; text-align: center; display: none;"></div>
        </div>
    </div>

    <script>
        const DB_NAME = "PDFManager";
        const STORE_NAME = "documents";
        const MAX_DOCS = 5;
        let db;
        let currentBlobUrl = null; // Guardar la URL actual del PDF

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject("Error abriendo IndexedDB");
            });
        }

        function getDocs() {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function addDoc(file) {
            const docs = await getDocs();
            if (docs.length >= MAX_DOCS) {
                alert(`Límite alcanzado. Solo puedes almacenar hasta ${MAX_DOCS} documentos.`);
                return false;
            }
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.add({ name: file.name, fileData: file, timestamp: new Date().getTime() });
                tx.oncomplete = () => resolve(true);
            });
        }

        function deleteDoc(id) {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.delete(id);
                tx.oncomplete = () => resolve();
            });
        }

        const fileInput = document.getElementById('fileInput');
        const docList = document.getElementById('docList');
        const statusCount = document.getElementById('statusCount');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || file.type !== "application/pdf") return;
            if (await addDoc(file)) renderList();
            fileInput.value = "";
        });

        async function renderList() {
            docList.innerHTML = "";
            const docs = await getDocs();
            statusCount.textContent = `Documentos: ${docs.length} / ${MAX_DOCS}`;
            fileInput.disabled = docs.length >= MAX_DOCS;

            docs.forEach(doc => {
                const li = document.createElement('li');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'doc-name';
                nameSpan.textContent = doc.name;

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'actions';

                const printBtn = document.createElement('button');
                printBtn.textContent = 'Ver e Imprimir';
                printBtn.className = 'btn-print';
                printBtn.onclick = () => openPrintModal(doc.fileData);

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '🗑️';
                deleteBtn.className = 'btn-delete';
                deleteBtn.onclick = async () => { await deleteDoc(doc.id); renderList(); };

                actionsDiv.appendChild(printBtn);
                actionsDiv.appendChild(deleteBtn);
                li.appendChild(nameSpan);
                li.appendChild(actionsDiv);
                docList.appendChild(li);
            });
        }

        // --- LÓGICA DE VISTA PREVIA Y MODAL ---
        function openPrintModal(fileBlob) {
            currentBlobUrl = URL.createObjectURL(fileBlob);
            
            // Asignar al iframe de vista previa
            document.getElementById('preview-frame').src = currentBlobUrl;
            
            // Asignar al iframe invisible de impresión
            document.getElementById('print-iframe').src = currentBlobUrl;

            // Restablecer interfaz
            document.getElementById('copiesInput').value = 1;
            document.getElementById('printStatus').style.display = 'none';
            
            // Mostrar modal
            document.getElementById('previewModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('previewModal').style.display = 'none';
            document.getElementById('preview-frame').src = "";
            document.getElementById('print-iframe').src = "";
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
        }

        // --- LÓGICA DE IMPRESIÓN (MANEJO DE COPIAS PARA MODO KIOSCO) ---
        async function executePrint() {
            const copies = parseInt(document.getElementById('copiesInput').value) || 1;
            const iframe = document.getElementById('print-iframe');
            const statusDiv = document.getElementById('printStatus');
            
            statusDiv.style.display = 'block';
            statusDiv.textContent = `Enviando ${copies} copia(s) a la impresora...`;

            iframe.contentWindow.focus();

            // Enviamos la orden de impresión la cantidad de veces solicitada.
            // NOTA: Si no tienes el modo Kiosco activado, esto abrirá la ventana de impresión X veces.
            for (let i = 0; i < copies; i++) {
                iframe.contentWindow.print();
                
                // Pequeña pausa entre copias para evitar que el navegador bloquee la ejecución rápida
                await new Promise(resolve => setTimeout(resolve, 500)); 
            }

            statusDiv.textContent = "¡Enviado exitosamente!";
            
            setTimeout(() => {
                closeModal();
            }, 1000);
        }

        window.onload = async () => {
            await initDB();
            renderList();
        };
    </script>
</body>
</html>
