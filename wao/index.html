<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor de Stickers y Etiquetas</title>
    <!-- Fabric.js v5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Lobster&family=Montserrat:wght@400;700&family=Pacifico&family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-color: #334155;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            z-index: 10;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            flex-direction: column;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Paneles laterales en Escritorio */
        .sidebar {
            width: 240px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar-right {
            width: 280px;
            border-right: none;
            border-left: 1px solid var(--border-color);
        }

        /* Área de Trabajo Central */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #cbd5e1;
            position: relative;
            padding: 16px;
            overflow: auto;
        }

        .canvas-wrapper {
            background-color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
        }

        /* Contenedor responsivo del Canvas */
        .canvas-container {
            position: relative;
            max-width: 100% !important;
            max-height: 70vh !important;
            aspect-ratio: var(--canvas-aspect, 1 / 1); /* Se actualiza dinámicamente según la relación ancho/alto */
            touch-action: none;
        }

        .upper-canvas, .lower-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 10px;
            margin-top: 18px;
            font-weight: 700;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 4px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            min-height: 38px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .align-btn {
            border: 1px solid var(--border-color);
            background-color: #f8fafc;
            color: #475569;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            min-height: 34px;
            border-radius: 4px;
        }
        
        .align-btn.active-align {
            background-color: #eeebff !important;
            color: var(--primary) !important;
            border-color: var(--primary) !important;
        }

        .control-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }

        select, input[type="text"], input[type="number"], input[type="range"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            outline: none;
            min-height: 36px;
        }

        /* Visor de Capas Independiente (Columna dedicada) */
        .layers-wrapper-sidebar {
            width: 240px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
            flex-shrink: 0;
        }

        .layers-panel {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #f8fafc;
            flex: 1;
            overflow-y: auto;
        }

        .layer-item {
            display: flex;
            flex-direction: column;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            background: white;
            gap: 6px;
        }

        .layer-item.active {
            background-color: #f0fdf4;
            border-left: 3px solid var(--accent);
        }

        .layer-info {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            font-weight: 600;
        }

        .layer-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .layer-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 4px;
            color: #64748b;
        }

        /* Lista de Proyectos */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            margin-bottom: 12px;
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .project-item-left {
            display: flex;
            align-items: center;
            flex: 1;
            overflow: hidden;
            cursor: pointer;
        }

        .project-item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            background-color: #e2e8f0;
            margin-right: 6px;
            border-radius: 4px;
        }

        /* Menú de pestañas para móviles */
        .mobile-tabs-bar {
            display: none;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            height: 60px;
            z-index: 15;
            width: 100%;
        }

        .mobile-tab-btn {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .mobile-tab-btn.active {
            color: var(--primary);
            background-color: #f8fafc;
            border-top: 3px solid var(--primary);
        }

        /* Modal de Configuración */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 16px;
        }

        .modal-content {
            background-color: white;
            border-radius: 8px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .flex-row {
            display: flex;
            gap: 8px;
        }

        .flex-row > * {
            flex: 1;
        }

        #fileInput {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        /* --- MEDIAS QUERIES ADAPTABILIDAD --- */
        @media (max-width: 1024px) {
            /* Compactar las columnas en pantallas medianas */
            .sidebar { width: 200px; }
            .layers-wrapper-sidebar { width: 200px; }
            .sidebar-right { width: 240px; }
        }

        @media (max-width: 768px) {
            header {
                height: auto;
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .header-title {
                align-items: center;
                text-align: center;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            #projectNameInput {
                width: 130px !important;
            }

            .main-container {
                flex-direction: column;
                height: calc(100vh - 120px);
            }

            /* Ocultar columnas para el sistema de pestañas móvil */
            .sidebar, .layers-wrapper-sidebar, .sidebar-right, .canvas-area {
                display: none !important;
                width: 100% !important;
                height: 100% !important;
                flex: 1;
                border: none;
            }

            .active-mobile-panel {
                display: flex !important;
            }

            .mobile-tabs-bar {
                display: flex;
            }

            .canvas-area {
                padding: 8px;
            }

            .canvas-wrapper {
                width: 90vw;
                height: auto;
                aspect-ratio: var(--canvas-aspect, 1 / 1);
                max-width: 450px;
                max-height: 450px;
            }
        }
    </style>
</head>
<body>

    <!-- Asistente de Inicio / Modal -->
    <div id="startupModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">Configurar Nueva Etiqueta</div>
            <div class="control-group">
                <label>Nombre del Proyecto</label>
                <input type="text" id="initProjectName" value="Nueva Etiqueta">
            </div>
            
            <div class="control-group">
                <label>Formato / Proporción de Medidas</label>
                <select id="initFormat">
                    <option value="1:1" selected>Proporcional (1:1 / Cuadrado)</option>
                    <option value="variable">Variable (Rectangular / Libre)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="flex-row">
                    <div>
                        <label id="widthLabel">Ancho (cm)</label>
                        <input type="number" id="initWidthCm" min="3" max="20" step="0.5" value="10">
                    </div>
                    <div>
                        <label id="heightLabel">Alto (cm)</label>
                        <input type="number" id="initHeightCm" min="3" max="20" step="0.5" value="10" disabled>
                    </div>
                </div>
                <span style="font-size: 0.65rem; color: #64748b; margin-top: 4px; display: block;">Rango admitido: Mínimo 3 cm | Máximo 20 cm.</span>
            </div>

            <div class="control-group">
                <label>Forma Inicial del Sticker</label>
                <select id="initShape">
                    <option value="circle">Círculo</option>
                    <option value="ellipse" disabled>Óvalo (Solo formato variable)</option>
                    <option value="rectangle">Rectángulo</option>
                    <option value="heart">Corazón</option>
                    <option value="diamond">Rombo</option>
                    <option value="triangle">Triángulo</option>
                </select>
            </div>
            <button class="btn" id="startProjectBtn">Crear Proyecto</button>
        </div>
    </div>

    <!-- Barra Superior -->
    <header>
        <div class="header-title">
            <span>Editor de Etiquetas</span>
            <span style="font-size: 0.75rem; color: #64748b; font-weight: normal;" id="currentProjectDisplay"></span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="undoBtn" title="Deshacer (Ctrl+Z)" style="width: auto; padding: 6px 10px; min-height: 34px;">↩</button>
            <button class="btn btn-secondary" id="redoBtn" title="Rehacer (Ctrl+Y)" style="width: auto; padding: 6px 10px; min-height: 34px;">↪</button>
            <input type="text" id="projectNameInput" style="width: 140px; height: 34px; min-height: 34px;" placeholder="Nombre">
            <button class="btn" id="saveProjectBtn" style="width: auto; height: 34px; min-height: 34px;">Guardar</button>
        </div>
    </header>

    <div class="main-container">
        <!-- 1. Columna Izquierda: Proyectos y Forma Base (Tab 1 en Móvil) -->
        <div class="sidebar" id="panel-projects">
            <div class="section-title">Proyectos Guardados</div>
            <div class="project-list" id="projectListContainer">
                <div style="color: #9ca3af; font-size: 0.75rem; text-align: center; padding: 10px;">Cargando...</div>
            </div>
            <button class="btn btn-secondary" id="newProjectTriggerBtn" style="margin-bottom: 16px;">+ Nuevo Proyecto</button>

            <div class="section-title">Cambiar Forma Base</div>
            <select id="canvasShapeSelect">
                <option value="circle">Círculo</option>
                <option value="ellipse">Óvalo</option>
                <option value="rectangle">Rectángulo</option>
                <option value="heart">Corazón</option>
                <option value="diamond">Rombo</option>
                <option value="triangle">Triángulo</option>
            </select>

            <div class="section-title" style="margin-top: auto;">Exportación</div>
            <button class="btn" id="exportBtn">Descargar Etiqueta (PNG)</button>
        </div>

        <!-- 2. Columna Separada: Visor de Capas Fijo (Tab 2 en Móvil) -->
        <div class="layers-wrapper-sidebar" id="panel-layers">
            <div class="section-title">Visor de Capas</div>
            <div class="layers-panel" id="layersList">
                <div style="color: #9ca3af; font-size: 0.75rem; text-align: center; padding: 10px;">Sin capas de elementos</div>
            </div>
        </div>

        <!-- 3. Columna Central: Área de Edición (Tab 3 en Móvil) -->
        <div class="canvas-area active-mobile-panel" id="panel-editor">
            <div class="canvas-wrapper">
                <canvas id="labelCanvas"></canvas>
            </div>
        </div>

        <!-- 4. Columna Derecha: Propiedades y Agregar Capas (Tab 4 en Móvil) -->
        <div class="sidebar sidebar-right" id="panel-properties">
            <div class="section-title">Añadir Capas</div>
            <div class="flex-row" style="margin-bottom: 14px;">
                <button class="btn btn-secondary" id="addTextBtn">Texto</button>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Imagen</button>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="section-title">Propiedades del Elemento</div>
            <div id="noSelectionMsg" style="color: #94a3b8; font-size: 0.75rem; text-align: center; padding: 12px; border: 1px dashed var(--border-color); border-radius: 6px;">
                Selecciona un elemento en el lienzo para configurarlo.
            </div>

            <div id="propertiesPanel" class="hidden">
                <div class="control-group">
                    <label>Organizar Capa</label>
                    <div class="flex-row">
                        <button class="btn btn-secondary" id="bringToFrontBtn" style="padding: 6px; font-size: 0.75rem; min-height: 32px;">Frente</button>
                        <button class="btn btn-secondary" id="sendToBackBtn" style="padding: 6px; font-size: 0.75rem; min-height: 32px;">Fondo</button>
                    </div>
                </div>

                <!-- Propiedades específicas de texto -->
                <div id="textControls" class="hidden">
                    <div class="control-group">
                        <label>Contenido del Texto</label>
                        <input type="text" id="textStringInput">
                    </div>

                    <div class="control-group">
                        <label>Tipografía</label>
                        <select id="fontFamilySelect">
                            <option value="Roboto" style="font-family: 'Roboto';">Roboto</option>
                            <option value="Montserrat" style="font-family: 'Montserrat';">Montserrat</option>
                            <option value="Playfair Display" style="font-family: 'Playfair Display';">Playfair</option>
                            <option value="Lobster" style="font-family: 'Lobster';">Lobster</option>
                            <option value="Pacifico" style="font-family: 'Pacifico';">Pacifico</option>
                            <option value="Caveat" style="font-family: 'Caveat';">Caveat</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <div class="flex-row">
                            <div>
                                <label>Tamaño</label>
                                <input type="number" id="fontSizeInput" min="8" max="100">
                            </div>
                            <div>
                                <label>Color</label>
                                <input type="color" id="textColorInput" style="padding: 2px; height: 36px; min-height: 36px;">
                            </div>
                        </div>
                    </div>

                    <!-- Alineación del Párrafo -->
                    <div class="control-group">
                        <label>Alineación del Texto</label>
                        <div class="flex-row">
                            <button class="align-btn" data-align="left">Izq</button>
                            <button class="align-btn" data-align="center">Centrar</button>
                            <button class="align-btn" data-align="right">Der</button>
                        </div>
                    </div>

                    <!-- Espaciado e interlineado -->
                    <div class="control-group">
                        <div class="flex-row">
                            <div>
                                <label id="charSpacingLabel">Espacio Letras (0)</label>
                                <input type="range" id="charSpacingInput" min="-100" max="400" value="0">
                            </div>
                            <div>
                                <label id="lineHeightLabel">Interlineado (1.15)</label>
                                <input type="range" id="lineHeightInput" min="0.5" max="2.5" step="0.1" value="1.15">
                            </div>
                        </div>
                    </div>

                    <!-- Borde de Texto (Contorno) -->
                    <div class="control-group" style="border-top: 1px dashed var(--border-color); padding-top: 10px;">
                        <label style="font-weight:700;">Contorno / Borde de Texto</label>
                        <div class="flex-row" style="align-items: center;">
                            <div style="flex: 2;">
                                <label id="strokeWidthLabel">Grosor: 0px</label>
                                <input type="range" id="strokeWidthInput" min="0" max="12" value="0" step="1">
                            </div>
                            <div style="flex: 1;">
                                <label>Color</label>
                                <input type="color" id="strokeColorInput" value="#000000" style="padding: 2px; height: 36px;">
                            </div>
                        </div>
                    </div>

                    <!-- Lomo Circular -->
                    <div style="border-top: 1px dashed var(--border-color); padding-top: 10px; margin-top: 10px;">
                        <div class="control-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                            <input type="checkbox" id="curvedTextCheckbox" style="width: auto;">
                            <label for="curvedTextCheckbox" style="margin-bottom: 0; cursor: pointer;">Habilitar Lomo Circular</label>
                        </div>
                        
                        <div id="curveControls" class="hidden">
                            <div class="control-group">
                                <label id="radiusLabel">Radio del Lomo: 150px</label>
                                <input type="range" id="curveRadiusInput" min="40" max="350" value="150">
                            </div>
                            <div class="control-group" style="display: flex; align-items: center; gap: 8px;">
                                <input type="checkbox" id="curveInvertCheckbox" style="width: auto;">
                                <label for="curveInvertCheckbox" style="margin-bottom: 0;">Lomo Inferior</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="control-group" style="margin-top: 15px;">
                    <button class="btn btn-danger" id="deleteElementBtn" style="min-height: 34px;">Eliminar Elemento</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barra de Pestañas Inferiores (Móviles) -->
    <div class="mobile-tabs-bar">
        <button class="mobile-tab-btn" data-target="panel-projects">
            <span>📁</span>
            <span>Proyectos</span>
        </button>
        <button class="mobile-tab-btn" data-target="panel-layers">
            <span>🥞</span>
            <span>Capas</span>
        </button>
        <button class="mobile-tab-btn active" data-target="panel-editor">
            <span>🎨</span>
            <span>Lienzo</span>
        </button>
        <button class="mobile-tab-btn" data-target="panel-properties">
            <span>✏️</span>
            <span>Props</span>
        </button>
    </div>

    <script>
        // Relación de conversión: 1 cm = 35 píxeles en pantalla
        const CM_TO_PX = 35; 

        // --- 1. CONFIGURACIÓN DE BASE DE DATOS (IndexedDB / Fallback) ---
        const DB_NAME = "AdvancedLabelEditorDB_v3";
        const DB_VERSION = 1;
        const STORE_NAME = "projects";
        let db = null;

        function initDatabase() {
            return new Promise((resolve) => {
                try {
                    if (!window.indexedDB) {
                        resolve(null);
                        return;
                    }
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = function(e) {
                        const database = e.target.result;
                        if (!database.objectStoreNames.contains(STORE_NAME)) {
                            database.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                        }
                    };
                    request.onsuccess = function(e) {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onerror = function() {
                        resolve(null);
                    };
                } catch (err) {
                    resolve(null);
                }
            });
        }

        function persistProject(projectData) {
            return new Promise((resolve, reject) => {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(projectData);
                    request.onsuccess = (e) => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } else {
                    try {
                        let localProjects = JSON.parse(localStorage.getItem('label_editor_projects_backup') || '[]');
                        if (projectData.id) {
                            const idx = localProjects.findIndex(p => p.id === projectData.id);
                            if (idx !== -1) localProjects[idx] = projectData;
                            else localProjects.push(projectData);
                        } else {
                            projectData.id = Date.now();
                            localProjects.push(projectData);
                        }
                        localStorage.setItem('label_editor_projects_backup', JSON.stringify(localProjects));
                        resolve(projectData.id);
                    } catch(err) {
                        alert("Límite de espacio en memoria excedido. Intenta reducir las dimensiones de las imágenes.");
                        reject(err);
                    }
                }
            });
        }

        function fetchAllProjects() {
            return new Promise((resolve) => {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = (e) => resolve(e.target.result || []);
                    request.onerror = () => resolve([]);
                } else {
                    try {
                        const local = JSON.parse(localStorage.getItem('label_editor_projects_backup') || '[]');
                        resolve(local);
                    } catch(e) {
                        resolve([]);
                    }
                }
            });
        }

        function fetchSingleProject(id) {
            return new Promise((resolve, reject) => {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(id);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                } else {
                    try {
                        const local = JSON.parse(localStorage.getItem('label_editor_projects_backup') || '[]');
                        const found = local.find(p => p.id === id);
                        resolve(found);
                    } catch(e) {
                        reject(e);
                    }
                }
            });
        }

        function removeProject(id) {
            return new Promise((resolve, reject) => {
                if (db) {
                    const transaction = db.transaction([STORE_NAME], "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                } else {
                    try {
                        let local = JSON.parse(localStorage.getItem('label_editor_projects_backup') || '[]');
                        local = local.filter(p => p.id !== id);
                        localStorage.setItem('label_editor_projects_backup', JSON.stringify(local));
                        resolve();
                    } catch(e) {
                        reject(e);
                    }
                }
            });
        }

        const canvas = new fabric.Canvas('labelCanvas', {
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        let currentProjectId = null;
        let guideShapeObj = null;

        function setCanvasDimensions(width, height) {
            canvas.setWidth(width);
            canvas.setHeight(height);
            canvas.calcOffset();
            // Declaración responsiva para mantener la relación de aspecto en CSS móvil
            const wrapper = document.querySelector('.canvas-wrapper');

        // --- 4. GESTIÓN DE HISTORIAL (Ctrl + Z / Ctrl + Y) ---
        let undoStack = [];
        let redoStack = [];
        let isHistoryOperation = false;

        function saveHistoryState() {
            if (isHistoryOperation) return;
            
            const currentState = {
                shape: currentShape,
                canvasData: JSON.stringify(canvas.toJSON(['clipPath', 'absolutePositioned']))
            };

            undoStack.push(currentState);
            if (undoStack.length > 25) {
                undoStack.shift();
            }
            redoStack = [];
            updateLayersPanel();
        }

        function undo() {
            if (undoStack.length <= 1) return;
            isHistoryOperation = true;
            const current = undoStack.pop();
            redoStack.push(current);

            const prevState = undoStack[undoStack.length - 1];
            applyState(prevState);
        }

        function redo() {
            if (redoStack.length === 0) return;
            isHistoryOperation = true;
            const nextState = redoStack.pop();
            undoStack.push(nextState);
            applyState(nextState);
        }

        function applyState(state) {
            currentShape = state.shape;
            document.getElementById('canvasShapeSelect').value = state.shape;
            
            canvas.loadFromJSON(state.canvasData, () => {
                applyLabelShape(currentShape);
                canvas.renderAll();
                updateLayersPanel();
                isHistoryOperation = false;
            });
        }

        // --- 5. TEXTO EN LOMO CIRCULAR ---
        function updateTextCurve(textObj, isCurved, radius, invert = false) {
            if (!textObj) return;

            if (isCurved) {
                const r = parseInt(radius);
                const sweepFlag = invert ? 0 : 1;
                const pathData = `M 0,${r} A ${r},${r} 0 0,${sweepFlag} ${r * 2},${r}`;
                
                const curvePath = new fabric.Path(pathData, {
                    fill: 'transparent',
                    stroke: 'transparent',
                    visible: false
                });

                textObj.set({
                    path: curvePath,
                    textAlign: 'center'
                });
            } else {
                textObj.set({
                    path: null
                });
            }
            canvas.renderAll();
        }

        // --- 6. GUÍAS Y RECORTE (NUEVAS FORMAS) ---
        function applyLabelShape(shape) {
            currentShape = shape;
            const w = canvas.width;
            const h = canvas.height;
            const centerX = w / 2;
            const centerY = h / 2;
            const pad = 15; // Margen de corte
            
            let clipPath;

            if (guideShapeObj) {
                canvas.remove(guideShapeObj);
            }

            const guideOptions = {
                stroke: '#475569',
                strokeDashArray: [4, 4],
                strokeWidth: 1.5,
                fill: 'transparent',
                selectable: false,
                evented: false,
                excludeFromExport: true
            };

            if (shape === 'circle') {
                const radius = (Math.min(w, h) / 2) - pad;
                clipPath = new fabric.Circle({
                    radius: radius,
                    left: centerX - radius,
                    top: centerY - radius,
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Circle({
                    ...guideOptions,
                    radius: radius,
                    left: centerX - radius,
                    top: centerY - radius
                });

            } else if (shape === 'ellipse') {
                const rx = (w / 2) - pad;
                const ry = (h / 2) - pad;
                clipPath = new fabric.Ellipse({
                    rx: rx,
                    ry: ry,
                    left: centerX - rx,
                    top: centerY - ry,
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Ellipse({
                    ...guideOptions,
                    rx: rx,
                    ry: ry,
                    left: centerX - rx,
                    top: centerY - ry
                });

            } else if (shape === 'rectangle') {
                const rw = w - (pad * 2);
                const rh = h - (pad * 2);
                clipPath = new fabric.Rect({
                    width: rw,
                    height: rh,
                    left: centerX - (rw / 2),
                    top: centerY - (rh / 2),
                    rx: 8,
                    ry: 8,
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Rect({
                    ...guideOptions,
                    width: rw,
                    height: rh,
                    left: centerX - (rw / 2),
                    top: centerY - (rh / 2),
                    rx: 8,
                    ry: 8
                });

            } else if (shape === 'triangle') {
                // Triángulo alineado a los bordes de seguridad
                const pathData = `M ${centerX} ${pad} L ${w - pad} ${h - pad} L ${pad} ${h - pad} Z`;
                clipPath = new fabric.Path(pathData, {
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Path(pathData, {
                    ...guideOptions
                });

            } else if (shape === 'diamond') {
                // Rombo perfecto adaptable
                const pathData = `M ${centerX} ${pad} L ${w - pad} ${centerY} L ${centerX} ${h - pad} L ${pad} ${centerY} Z`;
                clipPath = new fabric.Path(pathData, {
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Path(pathData, {
                    ...guideOptions
                });

            } else if (shape === 'heart') {
                // Corazón proporcional con curvas de Bézier
                const scaleX = (w - pad * 2) / 180 * 0.95;
                const scaleY = (h - pad * 2) / 200 * 0.95;
                
                const pathData = `M ${centerX} ${centerY + 90 * scaleY} 
                  C ${centerX} ${centerY + 70 * scaleY} ${centerX + 90 * scaleX} ${centerY + 10 * scaleY} ${centerX + 90 * scaleX} ${centerY - 50 * scaleY} 
                  C ${centerX + 90 * scaleX} ${centerY - 110 * scaleY} ${centerX + 30 * scaleX} ${centerY - 110 * scaleY} ${centerX} ${centerY - 70 * scaleY} 
                  C ${centerX - 30 * scaleX} ${centerY - 110 * scaleY} ${centerX - 90 * scaleX} ${centerY - 110 * scaleY} ${centerX - 90 * scaleX} ${centerY - 50 * scaleY} 
                  C ${centerX - 90 * scaleX} ${centerY + 10 * scaleY} ${centerX} ${centerY + 70 * scaleY} ${centerX} ${centerY + 90 * scaleY} Z`;

                clipPath = new fabric.Path(pathData, {
                    absolutePositioned: true
                });
                guideShapeObj = new fabric.Path(pathData, {
                    ...guideOptions
                });
            }

            canvas.clipPath = clipPath;
            canvas.add(guideShapeObj);
            guideShapeObj.sendToBack();
            canvas.renderAll();
        }

        // --- 7. VISOR DE CAPAS INDEPENDIENTE ---
        function updateLayersPanel() {
            const listContainer = document.getElementById('layersList');
            listContainer.innerHTML = '';
            
            const objects = canvas.getObjects().filter(obj => obj !== guideShapeObj);

            if (objects.length === 0) {
                listContainer.innerHTML = '<div style="color: #9ca3af; font-size: 0.75rem; text-align: center; padding: 10px;">Sin capas de elementos</div>';
                return;
            }

            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                const isSelected = canvas.getActiveObject() === obj;
                
                const item = document.createElement('div');
                item.className = `layer-item ${isSelected ? 'active' : ''}`;

                let label = "Objeto";
                if (obj.type === 'i-text' || obj.type === 'text') {
                    label = `Texto: "${obj.text.substring(0, 8)}${obj.text.length > 8 ? '...' : ''}"`;
                } else if (obj.type === 'image') {
                    label = 'Imagen / Foto';
                }

                item.innerHTML = `
                    <div class="layer-info" title="Seleccionar capa">${label}</div>
                    <div class="layer-controls">
                        <input type="range" class="opacity-slider" min="0" max="1" step="0.05" value="${obj.opacity || 1}" title="Opacidad" style="width: 70px; height: 4px; padding: 0;">
                        <button class="layer-btn visibility-btn" title="Mostrar/Ocultar">${obj.visible ? '👁️' : '👁️‍🗨️'}</button>
                    </div>
                `;

                item.querySelector('.layer-info').addEventListener('click', () => {
                    canvas.setActiveObject(obj);
                    canvas.renderAll();
                    if (window.innerWidth <= 768) {
                        switchMobileTab('panel-properties'); // Salta a propiedades en pantallas pequeñas
                    }
                });

                const slider = item.querySelector('.opacity-slider');
                slider.addEventListener('input', (e) => {
                    obj.set('opacity', parseFloat(e.target.value));
                    canvas.renderAll();
                });
                
                slider.addEventListener('change', () => {
                    saveHistoryState();
                });

                const visBtn = item.querySelector('.visibility-btn');
                visBtn.addEventListener('click', () => {
                    obj.set('visible', !obj.visible);
                    visBtn.textContent = obj.visible ? '👁️' : '👁️‍🗨️';
                    canvas.renderAll();
                    saveHistoryState();
                });

                listContainer.appendChild(item);
            }
        }

        // --- 8. PANEL DE CONTROL DE PROPIEDADES ---
        const propertiesPanel = document.getElementById('propertiesPanel');

        const strokeWidthInput = document.getElementById('strokeWidthInput');
        const strokeWidthLabel = document.getElementById('strokeWidthLabel');

        function syncActiveObjectUI(obj) {
            if (!obj || obj === guideShapeObj) {
                clearActiveObjectUI();
                return;
            }

            noSelectionMsg.classList.add('hidden');
            propertiesPanel.classList.remove('hidden');

            if (obj.type === 'text' || obj.type === 'i-text') {
                textControls.classList.remove('hidden');
                textStringInput.value = obj.text;
                fontFamilySelect.value = obj.fontFamily || 'Roboto';
                fontSizeInput.value = obj.fontSize || 24;
                textColorInput.value = obj.fill || '#334155';

                alignBtns.forEach(btn => {
                    if (btn.dataset.align === (obj.textAlign || 'left')) {
                        btn.classList.add('active-align');
                    } else {
                        btn.classList.remove('active-align');
                    }
                });

                const spacingVal = obj.charSpacing || 0;
                charSpacingInput.value = spacingVal;
                charSpacingLabel.innerText = `Espacio Letras (${spacingVal})`;

                const lineVal = obj.lineHeight || 1.15;
                lineHeightInput.value = lineVal;
                lineHeightLabel.innerText = `Interlineado (${lineVal.toFixed(2)})`;

                const strokeVal = obj.strokeWidth || 0;
                strokeWidthInput.value = strokeVal;
                strokeWidthLabel.innerText = `Grosor: ${strokeVal}px`;
                strokeColorInput.value = obj.stroke || '#000000';

                if (obj.path) {
                    curvedTextCheckbox.checked = true;
                    curveControls.classList.remove('hidden');
                    const r = Math.round(obj.path.width / 2) || 150;
                    curveRadiusInput.value = r;
                    radiusLabel.innerText = `Radio del Lomo: ${r}px`;
                    curveInvertCheckbox.checked = obj.path.path[0][2] === 0;
                } else {
                    curvedTextCheckbox.checked = false;
                    curveControls.classList.add('hidden');
                }
            } else {
                textControls.classList.add('hidden');
            }
            updateLayersPanel();
        }

        function clearActiveObjectUI() {
            noSelectionMsg.classList.remove('hidden');
            propertiesPanel.classList.add('hidden');
            updateLayersPanel();
        }

                active.set('lineHeight', val);
                canvas.renderAll();
            }

            document.getElementById('currentProjectDisplay').innerText = `(${name})`;

            if (guideShapeObj) guideShapeObj.visible = false;

            const thumbnail = canvas.toDataURL({ format: 'png', quality: 0.3, multiplier: 0.15 });

            if (guideShapeObj) guideShapeObj.visible = true;

                updatedAt: new Date().getTime(),

            };

            if (currentProjectId !== null) {
                projectData.id = currentProjectId;
            }

            persistProject(projectData).then((id) => {
                currentProjectId = id;
                loadProjectsList();
                alert("Proyecto guardado exitosamente.");
            }).catch(err => {
                console.error("Fallo al persistir proyecto:", err);
            });
        });

        function loadProjectsList() {
            const container = document.getElementById('projectListContainer');
            container.innerHTML = '<div style="color: #64748b; font-size: 0.75rem; text-align: center; padding: 10px;">Cargando lista...</div>';

            fetchAllProjects().then(list => {
                container.innerHTML = '';
                if (!list || list.length === 0) {
                    container.innerHTML = `<div style="color: #9ca3af; font-size: 0.75rem; text-align: center; padding: 10px;">Sin proyectos</div>`;
                    return;
                }

                list.sort((a,b) => b.updatedAt - a.updatedAt);

                list.forEach(proj => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    if (proj.id === currentProjectId) {
                        item.style.borderColor = 'var(--primary)';
                    }

                    item.innerHTML = `
                        <div class="project-item-left" onclick="loadSavedProject(${proj.id})">
                            <img src="${proj.thumbnail}" alt="preview">
                            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                <strong>${proj.name}</strong><br>
                                <span style="font-size:0.65rem; color:#64748b;">${proj.shape} - ${Math.round(proj.canvasWidth / CM_TO_PX)}x${Math.round(proj.canvasHeight / CM_TO_PX)}cm</span>
                            </div>
                        </div>
                        <button class="layer-btn" style="color:#ef4444;" onclick="deleteProject(${proj.id})">&times;</button>
                    `;
                    container.appendChild(item);
                });
            });
        }

        window.loadSavedProject = function(id) {
            fetchSingleProject(id).then(proj => {
                if (!proj) return;

                currentProjectId = proj.id;
                document.getElementById('projectNameInput').value = proj.name;
                document.getElementById('currentProjectDisplay').innerText = `(${proj.name})`;
                document.getElementById('canvasShapeSelect').value = proj.shape;
                startupModal.classList.add('hidden');

                const w = proj.canvasWidth || 350;
                const h = proj.canvasHeight || 350;
                setCanvasDimensions(w, h);

                canvas.loadFromJSON(proj.canvasJSON, () => {
                    applyLabelShape(proj.shape);
                    canvas.renderAll();
                    
                    undoStack = [{
                        shape: proj.shape,
                        canvasData: proj.canvasJSON
                    }];
                    redoStack = [];
                    updateLayersPanel();
                    
                    if (window.innerWidth <= 768) {
                        switchMobileTab('panel-editor');
                    }
                });
            });
        };

        window.deleteProject = function(id) {
            if (confirm("¿Seguro que deseas eliminar este proyecto?")) {
                removeProject(id).then(() => {
                    if (currentProjectId === id) {
                        currentProjectId = null;
                        document.getElementById('projectNameInput').value = "Nueva Etiqueta";
                        document.getElementById('currentProjectDisplay').innerText = "";
                        canvas.clear();
                        applyLabelShape('circle');
                    }
                    loadProjectsList();
                });
            }
        };

        // --- 13. EXPORTAR IMAGEN ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (guideShapeObj) {
                guideShapeObj.visible = false;
            }
            canvas.renderAll();

            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0
            });

            if (guideShapeObj) {
                guideShapeObj.visible = true;
            }
            canvas.renderAll();

            const link = document.createElement('a');
            link.download = `${document.getElementById('projectNameInput').value || 'etiqueta'}.png`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // --- 14. LOGICA DE PESTAÑAS MÓVILES (4 Pestañas) ---
        const mobileTabBtns = document.querySelectorAll('.mobile-tab-btn');
        const panels = {
            'panel-projects': document.getElementById('panel-projects'),
            'panel-layers': document.getElementById('panel-layers'),
            'panel-editor': document.getElementById('panel-editor'),
            'panel-properties': document.getElementById('panel-properties')
        };

        function switchMobileTab(targetId) {
            mobileTabBtns.forEach(btn => btn.classList.remove('active'));
            Object.values(panels).forEach(panel => panel.classList.remove('active-mobile-panel'));

            const activeBtn = document.querySelector(`.mobile-tab-btn[data-target="${targetId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            if (panels[targetId]) {
                panels[targetId].classList.add('active-mobile-panel');
            }

            canvas.calcOffset();
            canvas.renderAll();
        }

        mobileTabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                switchMobileTab(btn.dataset.target);
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                Object.values(panels).forEach(p => p.classList.remove('active-mobile-panel'));
            } else {
                const hasActive = Object.values(panels).some(p => p.classList.contains('active-mobile-panel'));
                if (!hasActive) {
                    switchMobileTab('panel-editor');
                }
            }
            canvas.calcOffset();
            canvas.renderAll();
        });

        // Teclado
        window.addEventListener('keydown', (e) => {
            const isEditing = canvas.getActiveObject() && canvas.getActiveObject().isEditing;
            if (isEditing) return;

            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                undo();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y')) {
                e.preventDefault();
                redo();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);

        // --- 15. INICIO DE LA APLICACIÓN ---
        window.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth <= 768) {
                switchMobileTab('panel-editor');
            } else {
                setCanvasDimensions(350, 350); // Medida inicial 10x10 cm por defecto
                applyLabelShape('circle');
            }
            
            initDatabase().then(() => {
                loadProjectsList();
            });
        });
    </script>
</body>
</html>
